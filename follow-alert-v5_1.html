<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Follow Alert</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}

@keyframes dropIn {
  0%   { transform: translateY(-80px) scale(0.85); opacity: 0; }
  65%  { transform: translateY(10px) scale(1.03); opacity: 1; }
  82%  { transform: translateY(-5px) scale(0.98); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes fadeUp {
  0%   { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes slideOut {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(60px) scale(0.9); opacity: 0; }
}

.alert-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  opacity: 0;
}
.alert-wrap.show    { display: flex; }
.alert-wrap.animIn  { animation: dropIn 0.65s cubic-bezier(0.22,1,0.36,1) forwards; }
.alert-wrap.animOut { animation: slideOut 0.4s ease-in forwards; }

.photo {
  width: 280px;
  height: auto;
  border-radius: 16px;
  border: 4px solid #222;
  display: block;
}

.text-block {
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.4s ease-out 0.45s forwards;
}
.follower-name {
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  display: block;
  text-shadow: 0 2px 12px rgba(0,0,0,0.9);
}
.follow-sub {
  font-size: 17px;
  color: #bbb;
  display: block;
  margin-top: 4px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
</style>
</head>
